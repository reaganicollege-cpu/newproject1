<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公开物品展览</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app public-app">
      <section class="topbar" aria-label="公开展览">
        <nav class="menu-bar" aria-label="页面菜单">
          <a href="#itemGrid">展览</a>
        </nav>
        <div class="title-block">
          <p class="eyebrow">PUBLIC EXHIBITION</p>
          <h1>物品陈列</h1>
        </div>
        <div class="top-right">
          <div class="top-actions public-search">
            <label class="search">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="搜索物品、分类、位置或说明" />
            </label>
          </div>
          <section class="summary" aria-label="展览概览">
            <div>
              <span id="totalCount">0</span>
              <p>全部藏品</p>
            </div>
            <div>
              <span id="categoryCount">0</span>
              <p>展区</p>
            </div>
            <div>
              <span id="featuredCount">0</span>
              <p>精选</p>
            </div>
          </section>
        </div>
      </section>

      <section class="workspace">
        <section class="content" aria-label="物品列表">
          <div class="list-toolbar">
            <div class="filters" id="filters"></div>
            <div class="view-tools">
              <label>
                排序
                <select id="sortSelect">
                  <option value="curated">精选优先</option>
                  <option value="newest">最新加入</option>
                  <option value="name">名称 A-Z</option>
                  <option value="category">展区分类</option>
                </select>
              </label>
            </div>
          </div>
          <div class="item-grid" id="itemGrid"></div>
          <div class="empty-state" id="emptyState" hidden>
            <h2>这里暂时没有展品</h2>
            <p>请确认公开链接是否完整，或稍后再试。</p>
          </div>
        </section>
      </section>
    </main>

    <template id="itemTemplate">
      <article class="item-card">
        <div class="artwork">
          <img alt="" />
          <div class="placeholder" aria-hidden="true"></div>
        </div>
        <div class="label-card">
          <div class="card-head">
            <div>
              <p class="accession"></p>
              <h3></h3>
            </div>
            <span class="tag"></span>
          </div>
          <p class="note"></p>
          <p class="meta"></p>
        </div>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="public.js"></script>
  </body>
</html>
